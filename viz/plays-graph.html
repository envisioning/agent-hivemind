<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Agent Hivemind — Skill Co-occurrence Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; display: flex; }
#graph-container { flex: 1; position: relative; }
svg { width: 100%; height: 100vh; }
.tooltip { position: absolute; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; padding: 8px 12px; font-size: 13px; pointer-events: none; opacity: 0; transition: opacity 0.15s; max-width: 300px; z-index: 10; }
.tooltip .skill-name { font-weight: 600; color: #D6F249; font-size: 15px; }
.tooltip .skill-count { color: #888; margin-top: 2px; }
.header { position: absolute; top: 16px; left: 20px; z-index: 5; }
.header h1 { font-size: 18px; font-weight: 600; color: #D6F249; }
.header p { font-size: 12px; color: #666; margin-top: 4px; }
.legend { position: absolute; bottom: 16px; left: 20px; font-size: 11px; color: #555; z-index: 5; }

/* Detail panel */
#detail-panel { width: 0; overflow: hidden; background: #111; border-left: 1px solid #222; transition: width 0.25s ease; flex-shrink: 0; }
#detail-panel.open { width: 400px; }
#detail-inner { width: 400px; padding: 20px; height: 100vh; overflow-y: auto; }
#detail-inner::-webkit-scrollbar { width: 6px; }
#detail-inner::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
.detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.detail-header h2 { font-size: 20px; color: #D6F249; font-weight: 600; }
.detail-close { background: none; border: 1px solid #333; color: #888; width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 16px; }
.detail-close:hover { color: #fff; border-color: #555; }
.detail-stats { color: #888; font-size: 13px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #222; }
.play-card { background: #1a1a1a; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: default; transition: border-color 0.15s; }
.play-card:hover { border-color: #444; }
.play-title { font-weight: 600; color: #e0e0e0; font-size: 14px; margin-bottom: 6px; }
.play-title a { color: #e0e0e0; text-decoration: none; }
.play-title a:hover { color: #D6F249; }
.play-desc { color: #999; font-size: 12px; line-height: 1.5; margin-bottom: 6px; }
.play-meta { display: flex; gap: 8px; font-size: 11px; }
.play-meta span { background: #222; padding: 2px 6px; border-radius: 3px; color: #888; }
.play-meta span.high { color: #D6F249; }
.play-meta span.medium { color: #8899aa; }
.play-meta span.low { color: #666; }
.play-gotcha { color: #aa7744; font-size: 11px; margin-top: 6px; font-style: italic; }
.connected-skills { margin-top: 12px; padding-top: 12px; border-top: 1px solid #222; }
.connected-skills h3 { font-size: 13px; color: #888; margin-bottom: 8px; }
.connected-pill { display: inline-block; background: #1a1a2e; border: 1px solid #333; border-radius: 12px; padding: 3px 10px; font-size: 11px; color: #aaa; margin: 2px 4px 2px 0; cursor: pointer; transition: all 0.15s; }
.connected-pill:hover { border-color: #D6F249; color: #D6F249; }
</style>
</head>
<body>
<div id="graph-container">
  <div class="header">
    <h1>🐝 Agent Hivemind — Skill Graph</h1>
    <p id="stats-line">Loading...</p>
  </div>
  <div class="legend">Drag nodes · Scroll to zoom · Click a skill to see its plays</div>
  <div class="tooltip" id="tooltip"></div>
  <svg id="graph"></svg>
</div>
<div id="detail-panel">
  <div id="detail-inner"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
let graphData = null;
const SUPABASE_URL = "https://tjcryyjrjxbcjzybzdow.supabase.co";

fetch("graph-data.json").then(r => r.json()).then(data => {
  graphData = data;
  document.getElementById("stats-line").textContent =
    `${data.nodes.reduce((s,n) => s + n.plays.length, 0)} plays · ${data.nodes.length} skills · ${data.links.length} co-occurrence edges`;
  renderGraph(data);
});

function renderGraph(data) {
  const container = document.getElementById("graph-container");
  const w = container.clientWidth, h = container.clientHeight || window.innerHeight;
  const svg = d3.select("#graph").attr("viewBox", [0, 0, w, h]);
  const tooltip = d3.select("#tooltip");
  const accent = "#D6F249";

  const maxCount = d3.max(data.nodes, d => d.count);
  const r = d3.scaleSqrt().domain([1, maxCount]).range([4, 28]);
  const color = d3.scaleSequential(d3.interpolateViridis).domain([0, Math.log(maxCount + 1)]);
  const maxWeight = d3.max(data.links, d => d.weight);
  const linkWidth = d3.scaleLinear().domain([1, maxWeight]).range([0.3, 4]);

  const g = svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.2, 6]).on("zoom", e => g.attr("transform", e.transform)));

  const sim = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.links).id(d => d.id).distance(d => 100 - Math.min(d.weight * 3, 60)))
    .force("charge", d3.forceManyBody().strength(d => -60 - d.count * 2))
    .force("center", d3.forceCenter(w / 2, h / 2))
    .force("collision", d3.forceCollide().radius(d => r(d.count) + 3));

  const link = g.append("g")
    .selectAll("line")
    .data(data.links)
    .join("line")
    .attr("stroke", "#282828")
    .attr("stroke-opacity", 0.5)
    .attr("stroke-width", d => linkWidth(d.weight));

  const node = g.append("g")
    .selectAll("g")
    .data(data.nodes)
    .join("g")
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  node.append("circle")
    .attr("r", d => r(d.count))
    .attr("fill", d => d.count >= 8 ? accent : color(Math.log(d.count + 1)))
    .attr("stroke", d => d.count >= 8 ? accent : "#444")
    .attr("stroke-width", d => d.count >= 8 ? 2 : 1)
    .attr("opacity", 0.85);

  node.filter(d => d.count >= 2).append("text")
    .text(d => d.id)
    .attr("font-size", d => Math.max(8, Math.min(14, 5 + d.count * 0.4)))
    .attr("fill", "#bbb")
    .attr("text-anchor", "middle")
    .attr("dy", d => r(d.count) + 12)
    .style("pointer-events", "none");

  function getConnected(nodeId) {
    const connected = new Set();
    data.links.forEach(l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      if (s === nodeId) connected.add(t);
      if (t === nodeId) connected.add(s);
    });
    return connected;
  }

  // Hover
  node.on("mouseover", (e, d) => {
    const connected = getConnected(d.id);
    node.select("circle").attr("opacity", n => n.id === d.id || connected.has(n.id) ? 1 : 0.12);
    node.selectAll("text").attr("opacity", n => n.id === d.id || connected.has(n.id) ? 1 : 0.12);
    link.attr("stroke-opacity", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return s === d.id || t === d.id ? 0.8 : 0.03;
    }).attr("stroke", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return s === d.id || t === d.id ? accent : "#282828";
    });
    tooltip.html(`<div class="skill-name">${d.id}</div><div class="skill-count">${d.count} plays · click to explore</div>`)
      .style("left", (e.pageX + 14) + "px").style("top", (e.pageY - 10) + "px").style("opacity", 1);
  })
  .on("mousemove", e => tooltip.style("left", (e.pageX + 14) + "px").style("top", (e.pageY - 10) + "px"))
  .on("mouseout", () => {
    node.select("circle").attr("opacity", 0.85);
    node.selectAll("text").attr("opacity", 1);
    link.attr("stroke-opacity", 0.5).attr("stroke", "#282828");
    tooltip.style("opacity", 0);
  });

  // Click → detail panel
  node.on("click", (e, d) => {
    e.stopPropagation();
    showDetail(d);
  });

  svg.on("click", () => closeDetail());

  sim.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  window.showDetailForSkill = function(skillId) {
    const n = data.nodes.find(n => n.id === skillId);
    if (n) showDetail(n);
  };
}

function showDetail(d) {
  const panel = document.getElementById("detail-panel");
  const inner = document.getElementById("detail-inner");
  const connected = [];

  if (graphData) {
    graphData.links.forEach(l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      if (s === d.id) connected.push({ skill: t, weight: l.weight });
      if (t === d.id) connected.push({ skill: s, weight: l.weight });
    });
    connected.sort((a, b) => b.weight - a.weight);
  }

  const plays = d.plays || [];
  const highValue = plays.filter(p => p.value === "high").length;

  let html = `
    <div class="detail-header">
      <h2>${d.id}</h2>
      <button class="detail-close" onclick="closeDetail()">×</button>
    </div>
    <div class="detail-stats">
      ${d.count} plays · ${highValue} high-value · ${connected.length} connected skills
    </div>
  `;

  if (connected.length > 0) {
    html += `<div class="connected-skills"><h3>Connected skills</h3>`;
    connected.forEach(c => {
      html += `<span class="connected-pill" onclick="showDetailForSkill('${c.skill}')">${c.skill} (${c.weight})</span>`;
    });
    html += `</div><br>`;
  }

  plays.forEach(p => {
    const effortClass = p.effort || "";
    const valueClass = p.value || "";
    html += `
      <div class="play-card">
        <div class="play-title"><a href="${SUPABASE_URL}/rest/v1/plays?id=eq.${p.id}&select=*" target="_blank">${p.title}</a></div>
        <div class="play-desc">${p.description}...</div>
        <div class="play-meta">
          <span class="${effortClass}">${p.effort || '?'} effort</span>
          <span class="${valueClass}">${p.value || '?'} value</span>
        </div>
        ${p.gotcha ? `<div class="play-gotcha">⚡ ${p.gotcha}...</div>` : ''}
      </div>
    `;
  });

  inner.innerHTML = html;
  panel.classList.add("open");
}

function closeDetail() {
  document.getElementById("detail-panel").classList.remove("open");
}
</script>
</body>
</html>
